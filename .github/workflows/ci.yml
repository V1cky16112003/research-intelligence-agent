name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PYTHONPATH: .

jobs:
  lint-and-test:
    name: Lint & Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: ruff check . --ignore E501,E402

      - name: Unit tests
        run: pytest tests/ -v --tb=short
        env:
          DATABASE_URL: ""
          REDIS_URL: ""
          GROQ_API_KEY: ""
          GEMINI_API_KEY: ""

  ragas-quality-gate:
    name: RAGAS Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: lint-and-test
    # Only run on PRs and pushes to main (not on forks without secrets)
    if: github.event_name == 'push' || (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository)
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-nomic-embed-text-v2-moe
          restore-keys: hf-nomic-embed-text-v2-moe

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run RAGAS quality gate
        run: python -m eval.run_ragas --ci --limit 10
        timeout-minutes: 15
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NVIDIA_NIM_API_KEY: ${{ secrets.NVIDIA_NIM_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          UPSTASH_REDIS_REST_URL: ${{ secrets.UPSTASH_REDIS_REST_URL }}
          UPSTASH_REDIS_REST_TOKEN: ${{ secrets.UPSTASH_REDIS_REST_TOKEN }}
          DAGSHUB_TOKEN: ${{ secrets.DAGSHUB_TOKEN }}
          DAGSHUB_REPO: ${{ secrets.DAGSHUB_REPO }}
          MLFLOW_TRACKING_URI: "https://dagshub.com/${{ secrets.DAGSHUB_REPO }}.mlflow"
          HF_HUB_DISABLE_PROGRESS_BARS: "1"

  keep-alive:
    name: Keep HF Space Alive
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - name: Ping HF Space
        run: |
          HF_URL="${{ secrets.HF_SPACE_URL }}"
          if [ -n "$HF_URL" ]; then
            curl -sf "$HF_URL/health" || echo "Space may be cold-starting, that's OK"
          else
            echo "HF_SPACE_URL secret not set yet -- skipping keep-alive"
          fi
